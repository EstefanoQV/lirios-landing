# ── Build ──────────────────────────────────────
[build]
  publish = "."          # la raíz del repo ES el sitio

# ── Redirects ──────────────────────────────────
# Fuerza HTTPS — Netlify lo hace automático, pero esto lo explícita
[[redirects]]
  from   = "http://*"
  to     = "https://:splat"
  status = 301
  force  = true

# ── Headers de seguridad ───────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Evita que el sitio sea cargado en iframes de otros dominios
    X-Frame-Options = "SAMEORIGIN"

    # Evita que el browser adivine el tipo de contenido
    X-Content-Type-Options = "nosniff"

    # Controla qué información de referrer se envía a otros sitios
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Habilita protección XSS en browsers viejos
    X-XSS-Protection = "1; mode=block"

    # Permissions Policy — deshabilita acceso a cámara/micrófono/geolocation
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

    # Content Security Policy — permite: mismo origen, fuentes de Google,
    # Formspree para el formulario, Unsplash para imágenes placeholder
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com data:; connect-src https://formspree.io; frame-ancestors 'none'"

# ── Cache para assets estáticos ─────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    # Imágenes y fuentes cacheadas 1 año
    Cache-Control = "public, max-age=31536000, immutable"